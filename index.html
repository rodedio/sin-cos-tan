<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiskunde App - Standaard Dark Mode</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Variabelen voor Dark Mode (Standaard) */
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --container-bg: #2c2c2c;
            --header-color: #66b2ff;
            --explanation-subtitle-color: #80c7ff;
            --section-bg: #383838;
            --section-border: #555555;
            --diagram-wrapper-bg: #222222;
            --diagram-wrapper-border: #4a4a4a;
            --input-bg: #3e3e3e;
            --input-text: #e0e0e0;
            --input-border: #666666;
            --button-primary-bg: #66b2ff;
            --button-primary-text: #1a1a1a;
            --button-primary-hover-bg: #80c7ff;
            --button-secondary-bg: #5a6268;
            --button-secondary-text: #e0e0e0;
            --button-secondary-hover-bg: #707880;
            --feedback-correct-text: #a7f0ba;
            --feedback-correct-bg: #223e2b;
            --feedback-correct-border: #355e40;
            --feedback-incorrect-text: #f5b9c0;
            --feedback-incorrect-bg: #4a2328;
            --feedback-incorrect-border: #70363d;
            --uitleg-extra-bg: #4d432c;
            --uitleg-extra-border: #806f44;
            --uitleg-stap-bg: #383838;
            --uitleg-stap-border: #66b2ff;
            --uitleg-stap-header: #66b2ff;
            --svg-default-stroke: #c9d1d9;
            --svg-highlight-stroke: #ff8c82;
            --svg-text-highlight-fill: #ff8c82;
            --svg-vertex-label-fill: #66b2ff;
            --svg-side-label-fill: #80c7ff;
            --svg-angle-label-fill: #ff8080;
            --svg-right-angle-stroke: #888888;
            --mode-bg: #333333;
            --mode-border: #555555;
            --numpad-bg: #444444;
            --numpad-button-bg: #555555;
            --numpad-button-hover-bg: #666666;
            --numpad-button-text: #e0e0e0;
            --active-input-border: #80c7ff;
            --active-input-bg: #383838;
            --answer-display-bg: #3e3e3e;
            --answer-display-border: #666;
        }

        /* Optionele Light Mode (indien de gebruiker terugschakelt) */
        body.light-mode {
            --bg-color: #f0f9ff;
            --text-color: #333;
            --container-bg: #ffffff;
            --header-color: #005A9C;
            --explanation-subtitle-color: #007bff;
            --section-bg: #e7f5ff;
            --section-border: #bde0fe;
            --diagram-wrapper-bg: #f8f9fa;
            --diagram-wrapper-border: #dee2e6;
            --input-bg: #fff;
            --input-text: #333;
            --input-border: #ced4da;
            --button-primary-bg: #007bff;
            --button-primary-text: white;
            --button-primary-hover-bg: #0056b3;
            --button-secondary-bg: #6c757d;
            --button-secondary-text: white;
            --button-secondary-hover-bg: #5a6268;
            --feedback-correct-text: #155724;
            --feedback-correct-bg: #d4edda;
            --feedback-correct-border: #c3e6cb;
            --feedback-incorrect-text: #721c24;
            --feedback-incorrect-bg: #f8d7da;
            --feedback-incorrect-border: #f5c6cb;
            --svg-default-stroke: #333;
            --svg-highlight-stroke: #d9534f;
            --svg-text-highlight-fill: #d9534f;
            --svg-vertex-label-fill: #005A9C;
            --svg-side-label-fill: #007bff;
            --svg-angle-label-fill: red;
            --svg-right-angle-stroke: #555;
            --mode-bg: #e0e0e0;
            --mode-border: #a0a0a0;
            --numpad-bg: #f0f0f0;
            --numpad-button-bg: #ffffff;
            --numpad-button-hover-bg: #e0e0e0;
            --numpad-button-text: #333;
            --active-input-border: #007bff;
            --active-input-bg: #e7f5ff;
            --answer-display-bg: #f0f0f0;
            --answer-display-border: #ccc;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 20px auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1, h2 { color: var(--header-color); text-align: center; margin-bottom: 20px; }
        
        .main-button-group { text-align: center; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

        button {
            padding: 12px 20px;
            background-color: var(--button-primary-bg);
            color: var(--button-primary-text);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-weight: 600;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .explanation, .quiz-section, .digibord-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid var(--section-border);
            border-radius: 8px;
            background-color: var(--section-bg);
        }

        .diagram-area {
            text-align: center;
            margin-bottom: 15px;
            background-color: var(--diagram-wrapper-bg);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid var(--diagram-wrapper-border);
        }

        .quiz-mode-wrapper, .digibord-mode-wrapper {
            display: flex; gap: 20px; margin-top: 25px; padding: 20px;
            border: 1px solid var(--mode-border); border-radius: 8px; background-color: var(--mode-bg);
        }

        .numpad-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            width: 200px; background-color: var(--numpad-bg); padding: 15px; border-radius: 8px;
        }

        .numpad-container button {
            width: 100%; padding: 15px 0; font-size: 1.2em;
            background-color: var(--numpad-button-bg); color: var(--numpad-button-text);
        }

        #quizAnswerDisplay {
            min-height: 50px; line-height: 50px; background-color: var(--answer-display-bg);
            border: 2px solid var(--answer-display-border); border-radius: 6px;
            font-size: 1.6em; font-weight: bold; margin-bottom: 10px;
            text-align: center; color: var(--header-color);
        }

        .feedback-message {
            margin-top: 15px; font-weight: bold; padding: 15px; border-radius: 6px; text-align: center; display: none;
        }
        .feedback-message.show { display: block; }
        .feedback-message.correct { color: var(--feedback-correct-text); background-color: var(--feedback-correct-bg); }
        .feedback-message.incorrect { color: var(--feedback-incorrect-text); background-color: var(--feedback-incorrect-bg); }

        /* SVG Styling */
        .triangle-side { stroke: var(--svg-default-stroke); stroke-width: 2px; }
        .triangle-side.highlighted-stroke { stroke: var(--svg-highlight-stroke); stroke-width: 4px; }
        .side-label, .angle-label-text { fill: var(--svg-side-label-fill); font-size: 14px; font-weight: 600; cursor: pointer; }
        .active-input-text { fill: var(--active-input-border); text-decoration: underline; font-weight: 800; }
        .right-angle-symbol { stroke: var(--svg-right-angle-stroke); fill: none; stroke-width: 2px; }

        .keyboard-hint {
            font-size: 0.85em; color: var(--text-color); opacity: 0.7; text-align: center; margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📐 Wiskunde App</h1>

        <div class="main-button-group">
            <button id="themeToggle">☀️ Light Mode</button>
            <button id="toggleQuizMode">Quiz Modus</button>
            <button id="toggleDigibordMode">Digibord Modus</button>
        </div>

        <!-- Quiz Modus -->
        <div class="quiz-mode-wrapper" id="quizModeWrapper">
            <div style="flex-grow: 1;">
                <div class="quiz-section">
                    <p id="question">Klik op 'Nieuwe Vraag' om te beginnen.</p>
                    <div class="diagram-area">
                         <svg id="questionTriangleSvg" width="300" height="225"></svg>
                    </div>
                    <div id="quizAnswerDisplay"></div>
                    <div class="keyboard-hint">Tip: Gebruik je toetsenbord (0-9, punt, Enter, Backspace)</div>
                    <div style="text-align: center; margin-top: 15px;">
                        <button onclick="checkAnswer()">Controleer (Enter)</button>
                        <button onclick="newQuestion()" style="background-color: var(--button-secondary-bg);">Nieuwe Vraag</button>
                    </div>
                    <div id="feedback" class="feedback-message"></div>
                </div>
            </div>
            <div class="numpad-container">
                <button onclick="numpadInput('1')">1</button><button onclick="numpadInput('2')">2</button><button onclick="numpadInput('3')">3</button>
                <button onclick="numpadInput('4')">4</button><button onclick="numpadInput('5')">5</button><button onclick="numpadInput('6')">6</button>
                <button onclick="numpadInput('7')">7</button><button onclick="numpadInput('8')">8</button><button onclick="numpadInput('9')">9</button>
                <button onclick="numpadInput('.')">.</button><button onclick="numpadInput('0')">0</button>
                <button onclick="numpadInput('backspace')" style="background-color: #d9534f; color: white;">⌫</button>
            </div>
        </div>

        <!-- Digibord Modus -->
        <div class="digibord-mode-wrapper" id="digibordModeWrapper" style="display: none;">
            <div style="flex-grow: 1;">
                <div class="digibord-section">
                    <p id="digibordMessage">Klik op een label om een waarde te typen.</p>
                    <div class="diagram-area">
                        <svg id="digibordTriangleSvg" width="450" height="300"></svg>
                    </div>
                    <div style="text-align: center;">
                        <button onclick="calculateDigibord()">Bereken Alles</button>
                        <button onclick="resetDigibord()" style="background-color: var(--button-secondary-bg);">Reset</button>
                    </div>
                </div>
            </div>
            <div class="numpad-container">
                <button onclick="numpadInput('1')">1</button><button onclick="numpadInput('2')">2</button><button onclick="numpadInput('3')">3</button>
                <button onclick="numpadInput('4')">4</button><button onclick="numpadInput('5')">5</button><button onclick="numpadInput('6')">6</button>
                <button onclick="numpadInput('7')">7</button><button onclick="numpadInput('8')">8</button><button onclick="numpadInput('9')">9</button>
                <button onclick="numpadInput('.')">.</button><button onclick="numpadInput('0')">0</button>
                <button onclick="numpadInput('backspace')" style="background-color: #d9534f; color: white;">⌫</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            mode: 'quiz',
            streak: 0,
            currentQuestion: null,
            quizInput: '',
            digibordValues: { L: null, O: null, A: null, angleA: null },
            activeDigibordKey: null,
            digibordInput: ''
        };

        const toRad = deg => deg * (Math.PI / 180);
        const toDeg = rad => rad * (180 / Math.PI);

        // Toetsenbord Luisteraar
        window.addEventListener('keydown', (e) => {
            if ((e.key >= '0' && e.key <= '9') || e.key === '.' || e.key === ',') {
                numpadInput(e.key === ',' ? '.' : e.key);
            }
            else if (e.key === 'Backspace') {
                numpadInput('backspace');
            }
            else if (e.key === 'Enter') {
                if (state.mode === 'quiz') checkAnswer();
                else if (state.mode === 'digibord') calculateDigibord();
            }
            else if (e.key === 'Escape') {
                if (state.mode === 'digibord') resetDigibord();
            }
        });

        function numpadInput(val) {
            if (state.mode === 'quiz') {
                if (val === 'backspace') state.quizInput = state.quizInput.slice(0, -1);
                else if (val === '.' && !state.quizInput.includes('.')) state.quizInput += '.';
                else if (val !== '.') state.quizInput += val;
                document.getElementById('quizAnswerDisplay').textContent = state.quizInput;
            } else {
                if (!state.activeDigibordKey) return;
                if (val === 'backspace') state.digibordInput = state.digibordInput.slice(0, -1);
                else if (val === '.' && !state.digibordInput.includes('.')) state.digibordInput += '.';
                else if (val !== '.') state.digibordInput += val;
                
                state.digibordValues[state.activeDigibordKey] = parseFloat(state.digibordInput) || null;
                document.getElementById('digibordMessage').textContent = `Invoer voor ${state.activeDigibordKey}: ${state.digibordInput}`;
                drawTriangle('digibordTriangleSvg', state.digibordValues, 'digibord');
            }
        }

        function drawTriangle(svgId, data, type) {
            const svg = d3.select("#" + svgId);
            svg.selectAll("*").remove();
            const width = +svg.attr("width"), height = +svg.attr("height"), pad = 60;

            let angle = data.angleA || 30, a = data.A || 10, o = data.O || (a * Math.tan(toRad(angle)));
            const scale = Math.min((width - 2*pad) / Math.max(a, 1), (height - 2*pad) / Math.max(o, 1));
            const sa = a * scale, so = o * scale;
            const xC = pad, yC = height - pad, xA = xC + sa, yA = yC, xB = xC, yB = yC - so;

            const g = svg.append("g");
            const lines = [{x1:xC, y1:yC, x2:xA, y2:yA, key:'A'}, {x1:xC, y1:yC, x2:xB, y2:yB, key:'O'}, {x1:xA, y1:yA, x2:xB, y2:yB, key:'L'}];
            
            g.selectAll("line").data(lines).enter().append("line")
                .attr("x1", d=>d.x1).attr("y1", d=>d.y1).attr("x2", d=>d.x2).attr("y2", d=>d.y2)
                .attr("class", d => "triangle-side" + (state.currentQuestion?.highlight === d.key ? " highlighted-stroke" : ""));

            const labels = [
                {x: (xC+xA)/2, y: yA + 30, text: `A: ${data.A?.toFixed(1) || '?'}`, key: 'A'},
                {x: xC - 10, y: (yC+yB)/2, text: `O: ${data.O?.toFixed(1) || '?'}`, key: 'O', anchor: 'end'},
                {x: (xA+xB)/2 + 20, y: (yA+yB)/2 - 10, text: `L: ${data.L?.toFixed(1) || '?'}`, key: 'L', anchor: 'start'}
            ];

            g.selectAll(".side-label").data(labels).enter().append("text")
                .attr("x", d=>d.x).attr("y", d=>d.y).attr("text-anchor", d => d.anchor || 'middle')
                .attr("class", d => `side-label ${state.activeDigibordKey === d.key ? 'active-input-text' : ''}`)
                .text(d => d.text).on("click", (e,d) => type === 'digibord' && selectKey(d.key));

            g.append("text").attr("x", xA - 55).attr("y", yA - 15)
                .attr("class", `angle-label-text ${state.activeDigibordKey === 'angleA' ? 'active-input-text' : ''}`)
                .text(`∠A: ${data.angleA?.toFixed(1) || '?'}°`).on("click", () => type === 'digibord' && selectKey('angleA'));

            g.append("path").attr("d", `M ${xC+15},${yC} L ${xC+15},${yC-15} L ${xC},${yC-15}`).attr("class", "right-angle-symbol");
        }

        function selectKey(key) {
            state.activeDigibordKey = key;
            state.digibordInput = '';
            document.getElementById('digibordMessage').textContent = `Typ een waarde voor ${key}...`;
            drawTriangle('digibordTriangleSvg', state.digibordValues, 'digibord');
        }

        function newQuestion() {
            const angle = 25 + Math.random() * 40;
            const a = 6 + Math.random() * 8;
            const o = a * Math.tan(toRad(angle));
            const l = Math.sqrt(a*a + o*o);
            state.quizInput = '';
            document.getElementById('quizAnswerDisplay').textContent = '';
            document.getElementById('feedback').classList.remove('show');
            
            const qType = Math.random();
            if (qType < 0.5) {
                state.currentQuestion = { angleA: angle, A: a, O: o, L: l, highlight: 'O', ans: o, text: `Bereken O als ∠A = ${angle.toFixed(1)}° en A = ${a.toFixed(1)}` };
                drawTriangle('questionTriangleSvg', { angleA: angle, A: a }, 'quiz');
            } else {
                state.currentQuestion = { angleA: angle, A: a, O: o, L: l, highlight: 'L', ans: l, text: `Bereken L met Pythagoras als O = ${o.toFixed(1)} en A = ${a.toFixed(1)}` };
                drawTriangle('questionTriangleSvg', { O: o, A: a }, 'quiz');
            }
            document.getElementById('question').textContent = state.currentQuestion.text;
        }

        function checkAnswer() {
            const val = parseFloat(state.quizInput);
            if (isNaN(val)) return;
            const correct = Math.abs(val - state.currentQuestion.ans) < 0.2;
            const fb = document.getElementById('feedback');
            fb.textContent = correct ? "Goed gedaan! 🎉" : `Helaas, het antwoord was ${state.currentQuestion.ans.toFixed(1)}`;
            fb.className = `feedback-message show ${correct ? 'correct' : 'incorrect'}`;
            if (correct) setTimeout(newQuestion, 1500);
        }

        function calculateDigibord() {
            const { L, O, A, angleA } = state.digibordValues;
            let res = { ...state.digibordValues };
            if (O && A) { res.L = Math.sqrt(O*O + A*A); res.angleA = toDeg(Math.atan(O/A)); }
            else if (L && O) { res.A = Math.sqrt(L*L - O*O); res.angleA = toDeg(Math.asin(O/L)); }
            else if (A && angleA) { res.L = A / Math.cos(toRad(angleA)); res.O = A * Math.tan(toRad(angleA)); }
            else if (L && angleA) { res.O = L * Math.sin(toRad(angleA)); res.A = L * Math.cos(toRad(angleA)); }
            state.digibordValues = res;
            drawTriangle('digibordTriangleSvg', res, 'digibord');
            document.getElementById('digibordMessage').textContent = "Berekening uitgevoerd.";
        }

        function resetDigibord() {
            state.digibordValues = { L: null, O: null, A: null, angleA: null };
            state.activeDigibordKey = null;
            state.digibordInput = '';
            document.getElementById('digibordMessage').textContent = "Klik op een label om te beginnen.";
            drawTriangle('digibordTriangleSvg', state.digibordValues, 'digibord');
        }

        function switchMode(mode) {
            state.mode = mode;
            document.getElementById('quizModeWrapper').style.display = mode === 'quiz' ? 'flex' : 'none';
            document.getElementById('digibordModeWrapper').style.display = mode === 'digibord' ? 'flex' : 'none';
            if (mode === 'quiz') newQuestion(); else resetDigibord();
        }

        document.getElementById('themeToggle').onclick = () => {
            const isLight = document.body.classList.toggle('light-mode');
            document.getElementById('themeToggle').textContent = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
            // Herteken driehoek bij thema-wissel voor kleur-update
            if (state.mode === 'quiz') drawTriangle('questionTriangleSvg', state.currentQuestion, 'quiz');
            else drawTriangle('digibordTriangleSvg', state.digibordValues, 'digibord');
        };

        document.getElementById('toggleQuizMode').onclick = () => switchMode('quiz');
        document.getElementById('toggleDigibordMode').onclick = () => switchMode('digibord');
        
        // Start de eerste vraag
        newQuestion();
    </script>
</body>
</html>
