<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiskunde Trainer Pro</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --container-bg: #2c2c2c;
            --header-color: #66b2ff;
            --section-bg: #383838;
            --section-border: #555555;
            --diagram-wrapper-bg: #222222;
            --button-primary-bg: #66b2ff;
            --button-primary-text: #1a1a1a;
            --feedback-correct-bg: #223e2b;
            --feedback-incorrect-bg: #4a2328;
            --numpad-bg: #444444;
            --numpad-button-bg: #555555;
            --numpad-button-text: #e0e0e0;
        }

        body.light-mode {
            --bg-color: #f0f9ff;
            --text-color: #333;
            --container-bg: #ffffff;
            --header-color: #005A9C;
            --section-bg: #e7f5ff;
            --section-border: #bde0fe;
            --diagram-wrapper-bg: #f8f9fa;
            --button-primary-bg: #007bff;
            --button-primary-text: white;
            --feedback-correct-bg: #d4edda;
            --feedback-incorrect-bg: #f8d7da;
            --numpad-bg: #f0f0f0;
            --numpad-button-bg: #ffffff;
            --numpad-button-text: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            transition: all 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--section-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .streak-fire { color: #ff8c00; }

        .main-button-group { text-align: center; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

        button {
            padding: 12px 20px; background-color: var(--button-primary-bg);
            color: var(--button-primary-text); border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }

        .mode-wrapper { display: flex; gap: 20px; margin-top: 20px; flex-direction: column; }
        @media (min-width: 768px) {
            .mode-wrapper { flex-direction: row; }
        }

        .quiz-settings {
            background: var(--section-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--section-border);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .quiz-content { flex: 1; background: var(--section-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--section-border); }

        .diagram-area {
            background: var(--diagram-wrapper-bg); border-radius: 6px; padding: 10px;
            margin: 15px 0; text-align: center;
        }

        #quizAnswerDisplay {
            height: 60px; line-height: 60px; font-size: 2em; text-align: center;
            background: var(--bg-color); border: 2px solid var(--section-border);
            border-radius: 8px; margin-bottom: 10px; color: var(--header-color);
        }

        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: var(--numpad-bg); padding: 15px; border-radius: 10px; width: 100%; max-width: 250px; margin: 0 auto;
        }

        .numpad button {
            background: var(--numpad-button-bg); color: var(--numpad-button-text);
            font-size: 1.4em; padding: 15px 0;
        }

        .feedback-area {
            margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold;
        }

        .triangle-side { stroke: #c9d1d9; stroke-width: 2px; }
        .highlight { stroke: #ff8c82; stroke-width: 4px; }
        .label-text { fill: var(--header-color); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📐 Wiskunde Trainer</h1>

        <div class="stats-bar">
            <span>Score: <span id="scoreVal">0</span></span>
            <span>Streak: <span id="streakVal" class="streak-fire">0</span> 🔥</span>
        </div>

        <div class="main-button-group">
            <button id="themeToggle">☀️ Light Mode</button>
            <button onclick="switchMode('quiz')">Quiz Modus</button>
            <button onclick="switchMode('digibord')">Digibord Modus</button>
        </div>

        <div id="quizMode">
            <div class="quiz-settings">
                <strong>Onderwerpen oefenen:</strong>
                <div class="settings-grid">
                    <label><input type="checkbox" id="check-pyth" checked> Pythagoras</label>
                    <label><input type="checkbox" id="check-sin" checked> Sinus</label>
                    <label><input type="checkbox" id="check-cos" checked> Cosinus</label>
                    <label><input type="checkbox" id="check-tan" checked> Tangens</label>
                </div>
            </div>

            <div class="mode-wrapper">
                <div class="quiz-content">
                    <h3 id="questionText">Laden...</h3>
                    <div class="diagram-area">
                        <svg id="quizSvg" width="350" height="250"></svg>
                    </div>
                    <div id="quizAnswerDisplay"></div>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button onclick="checkAnswer()">Check</button>
                        <button onclick="generateQuestion()" style="background: #6c757d; color: white;">Volgende</button>
                    </div>
                    <div id="feedback" class="feedback-area"></div>
                </div>

                <div class="numpad">
                    <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
                    <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
                    <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
                    <button onclick="press('.')">.</button><button onclick="press('0')">0</button>
                    <button onclick="press('back')" style="background:#d9534f; color:white">⌫</button>
                </div>
            </div>
        </div>

        <div id="digibordMode" style="display:none">
            <div class="mode-wrapper">
                <div class="quiz-content">
                    <h3>Digibord: Vrij tekenen en rekenen</h3>
                    <div class="diagram-area">
                        <svg id="digiSvg" width="450" height="300"></svg>
                    </div>
                    <p>Klik op een zijde of hoek en voer een getal in.</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button onclick="calculateAll()">Bereken Alles</button>
                        <button onclick="resetDigi()" style="background:#6c757d; color:white">Reset</button>
                    </div>
                </div>
                <div class="numpad">
                    <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
                    <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
                    <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
                    <button onclick="press('.')">.</button><button onclick="press('0')">0</button>
                    <button onclick="press('back')" style="background:#d9534f; color:white">⌫</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            mode: 'quiz',
            score: 0,
            streak: 0,
            input: '',
            current: null,
            digiValues: { A: null, O: null, L: null, hoek: null },
            activeKey: null
        };

        const toRad = d => d * Math.PI / 180;
        const toDeg = r => r * 180 / Math.PI;

        function switchMode(m) {
            state.mode = m;
            document.getElementById('quizMode').style.display = m === 'quiz' ? 'block' : 'none';
            document.getElementById('digibordMode').style.display = m === 'digibord' ? 'block' : 'none';
            if(m === 'quiz') generateQuestion(); else draw('digiSvg', state.digiValues, true);
        }

        function press(key) {
            if (key === 'back') state.input = state.input.slice(0, -1);
            else if (key === '.' && state.input.includes('.')) return;
            else if (state.input.length < 6) state.input += key;

            if (state.mode === 'quiz') {
                document.getElementById('quizAnswerDisplay').textContent = state.input;
            } else if (state.activeKey) {
                state.digiValues[state.activeKey] = parseFloat(state.input);
                draw('digiSvg', state.digiValues, true);
            }
        }

        function generateQuestion() {
            state.input = '';
            document.getElementById('quizAnswerDisplay').textContent = '';
            document.getElementById('feedback').style.display = 'none';
            
            const activeTypes = [];
            if(document.getElementById('check-pyth').checked) activeTypes.push('pyth');
            if(document.getElementById('check-sin').checked) activeTypes.push('sin');
            if(document.getElementById('check-cos').checked) activeTypes.push('cos');
            if(document.getElementById('check-tan').checked) activeTypes.push('tan');

            if(activeTypes.length === 0) {
                document.getElementById('questionText').textContent = "Selecteer onderwerpen!";
                return;
            }

            const type = activeTypes[Math.floor(Math.random() * activeTypes.length)];
            const hoek = 25 + Math.random() * 45;
            const A = 5 + Math.random() * 10;
            const O = A * Math.tan(toRad(hoek));
            const L = Math.sqrt(A*A + O*O);
            
            let q = { hoek, A, O, L, type };

            if (type === 'pyth') {
                q.text = "Bereken zijde L.";
                q.draw = { A, O }; q.ans = L; q.target = 'L';
            } else if (type === 'sin') {
                q.text = "Bereken zijde O.";
                q.draw = { hoek, L }; q.ans = O; q.target = 'O';
            } else if (type === 'cos') {
                q.text = "Bereken zijde A.";
                q.draw = { hoek, L }; q.ans = A; q.target = 'A';
            } else {
                q.text = "Bereken zijde O.";
                q.draw = { hoek, A }; q.ans = O; q.target = 'O';
            }

            state.current = q;
            document.getElementById('questionText').textContent = q.text;
            draw('quizSvg', q.draw, false, q.target);
        }

        function checkAnswer() {
            if (!state.current || state.mode !== 'quiz' || state.input === '') return;
            const userAns = parseFloat(state.input);
            const diff = Math.abs(userAns - state.current.ans);
            const correct = diff < 0.2;

            const fb = document.getElementById('feedback');
            fb.style.display = 'block';
            fb.style.background = correct ? 'var(--feedback-correct-bg)' : 'var(--feedback-incorrect-bg)';
            
            if (correct) {
                state.score += 10;
                state.streak++;
                fb.innerHTML = `Correct! +10`;
                setTimeout(generateQuestion, 1200);
            } else {
                state.streak = 0;
                fb.innerHTML = `Fout. Het antwoord was ${state.current.ans.toFixed(1)}`;
            }

            document.getElementById('scoreVal').textContent = state.score;
            document.getElementById('streakVal').textContent = state.streak;
        }

        function draw(id, data, interactive, targetKey = null) {
            const svg = d3.select("#" + id);
            svg.selectAll("*").remove();
            
            const w = +svg.attr("width"), h = +svg.attr("height"), p = 50;
            const hoek = data.hoek || 30;
            const aLen = data.A || 10;
            const oLen = data.O || (aLen * Math.tan(toRad(hoek)));
            
            const scale = Math.min((w-2*p)/Math.max(aLen, 1), (h-2*p)/Math.max(oLen, 1));
            const sa = aLen * scale, so = oLen * scale;
            
            const x1 = p, y1 = h - p;
            const x2 = x1 + sa, y2 = y1;
            const x3 = x1, y3 = y1 - so;

            const g = svg.append("g");
            const lines = [{x1,y1,x2,y2,k:'A'}, {x1,y1,x2:x3,y2:y3,k:'O'}, {x1:x2,y1:y2,x2:x3,y2:y3,k:'L'}];
            g.selectAll("line").data(lines).enter().append("line")
                .attr("x1", d=>d.x1).attr("y1", d=>d.y1).attr("x2", d=>d.x2).attr("y2", d=>d.y2)
                .attr("class", d => `triangle-side ${d.k === targetKey ? 'highlight' : ''}`);

            const labels = [
                {x: (x1+x2)/2, y: y1+25, val: data.A, k:'A', label: 'A'},
                {x: x1-15, y: (y1+y3)/2, val: data.O, k:'O', label: 'O', anchor: 'end'},
                {x: (x2+x3)/2+15, y: (y2+y3)/2-10, val: data.L, k:'L', label: 'L'}
            ];

            g.selectAll("text").data(labels).enter().append("text")
                .attr("x", d=>d.x).attr("y", d=>d.y).attr("text-anchor", d=>d.anchor||'middle')
                .attr("class", d => `label-text ${state.activeKey === d.k ? 'highlight' : ''}`)
                .text(d => d.val ? `${d.label}: ${d.val.toFixed(1)}` : (d.k === targetKey ? `${d.label}: ?` : d.label))
                .on("click", (e, d) => { if(interactive) { state.activeKey = d.k; state.input = ''; draw(id, data, true); } });

            g.append("text").attr("x", x2-45).attr("y", y2-10).attr("class", "label-text")
                .text(`∠${data.hoek ? data.hoek.toFixed(1) : '?'}°`)
                .on("click", () => { if(interactive) { state.activeKey = 'hoek'; state.input = ''; draw(id, data, true); } });
            
            g.append("path").attr("d", `M ${x1+15},${y1} L ${x1+15},${y1-15} L ${x1},${y1-15}`)
                .attr("fill", "none").attr("stroke", "#888");
        }

        function calculateAll() {
            let v = state.digiValues;
            if (v.O && v.A) { v.L = Math.sqrt(v.O**2 + v.A**2); v.hoek = toDeg(Math.atan(v.O/v.A)); }
            else if (v.L && v.O) { v.A = Math.sqrt(v.L**2 - v.O**2); v.hoek = toDeg(Math.asin(v.O/v.L)); }
            else if (v.hoek && v.A) { v.O = v.A * Math.tan(toRad(v.hoek)); v.L = v.A / Math.cos(toRad(v.hoek)); }
            else if (v.hoek && v.L) { v.O = v.L * Math.sin(toRad(v.hoek)); v.A = v.L * Math.cos(toRad(v.hoek)); }
            draw('digiSvg', v, true);
        }

        function resetDigi() {
            state.digiValues = { A: null, O: null, L: null, hoek: null };
            state.activeKey = null; state.input = '';
            draw('digiSvg', state.digiValues, true);
        }

        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('light-mode');
            if(state.mode === 'quiz') draw('quizSvg', state.current.draw, false, state.current.target); 
            else draw('digiSvg', state.digiValues, true);
        };

        generateQuestion();
    </script>
</body>
</html>
